<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create QR Form</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef2f6;
      color: #162a48;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    .page { max-width: 760px; margin: 0 auto; padding: 20px 16px 32px; }
    .topbar { position: relative; display: flex; align-items: center; justify-content: flex-end; margin-bottom: 22px; }
    .menu-button {
      appearance: none;
      border: 1px solid #d6dce6;
      border-radius: 16px;
      padding: 10px 14px;
      background: #fff;
      color: #1f3a68;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      transition: transform .15s ease, box-shadow .15s ease, border-color .2s ease;
    }
    .menu-button:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(17, 55, 101, .08); border-color: #cbd5e1; }
    .menu-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 0.95rem;
      line-height: 1;
    }
    .nav-menu {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      left: 0;
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.98);
      border: 1px solid #d6dce6;
      border-radius: 24px;
      box-shadow: 0 28px 60px rgba(15, 23, 42, .16);
      backdrop-filter: blur(16px);
      z-index: 10;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity .25s ease, transform .25s ease;
    }
    .topbar.open .nav-menu { display: flex; opacity: 1; transform: translateY(0); }
    .nav-menu a {
      text-decoration: none;
      color: #1f3a68;
      background: #f8fbff;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: transform .15s ease, box-shadow .15s ease, border-color .2s ease;
    }
    .nav-menu a:hover { transform: translateX(4px); box-shadow: 0 12px 28px rgba(17, 55, 101, .08); border-color: #d6dce6; }
    .card {
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid #dfe7f2;
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(26, 61, 117, .08);
      padding: 24px;
    }
    h1 { margin: 0 0 18px; font-size: clamp(1.8rem, 4vw, 2.4rem); text-align: center; }
    .error { margin: 0 0 16px; padding: 14px 16px; border-radius: 18px; background: #ffe8e8; color: #8f1d24; border: 1px solid #f2c2c2; display: none; }
    form { display: grid; gap: 18px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #2b3e5d; }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #c8d2e0;
      border-radius: 16px;
      font-size: 1rem;
      background: #fbfdff;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    input:focus { outline: none; border-color: #6a98ff; box-shadow: 0 0 0 4px rgba(106, 152, 255, .16); }
    .section { padding: 14px 0 0; }
    .section h2 { margin: 0 0 12px; font-size: 1.05rem; color: #1e3a61; }
    .item {
      padding: 18px;
      border: 1px solid #d9e3f1;
      border-radius: 18px;
      background: #ffffff;
      display: grid;
      gap: 12px;
    }
    .item button { width: fit-content; margin-top: 4px; }
    .button-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    button {
      appearance: none;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s ease, transform .15s ease;
    }
    button:hover { background: #1d4ed8; transform: translateY(-1px); }
    button.secondary {
      background: #475569;
    }
    button.secondary:hover { background: #334155; }
    @media (max-width: 520px) {
      .card { padding: 18px; }
      .button-row { flex-direction: column; align-items: stretch; }
      .topbar { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="topbar" aria-label="Primary navigation">
      <button id="menuToggle" class="menu-button" type="button" aria-expanded="false" aria-controls="navMenu">
        <span class="menu-icon">☰</span>
        Menu
      </button>
      <div id="navMenu" class="nav-menu" hidden>
        <a href="index.html">Home</a>
        <a href="create.html">Create QR</a>
        <a id="editLink" href="create.html">Edit QR</a>
      </div>
    </nav>

    <div class="card">
      <h1 id="pageTitle">Create QR Form</h1>
      <p id="error" class="error"></p>

      <form id="qrForm">
        <div>
          <label for="firstName">First name</label>
          <input id="firstName" name="firstName" required>
        </div>
        <div>
          <label for="lastName">Last name</label>
          <input id="lastName" name="lastName" required>
        </div>
        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="phone">
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email">
        </div>

        <section class="section">
          <h2>Socials</h2>
          <div id="socialList"></div>
          <div class="button-row">
            <button type="button" id="addSocial" class="secondary">Add social</button>
          </div>
        </section>

        <section class="section">
          <h2>Websites</h2>
          <div id="websiteList"></div>
          <div class="button-row">
            <button type="button" id="addWebsite" class="secondary">Add website</button>
          </div>
        </section>

        <div class="button-row">
          <button type="submit" id="submitButton">Create QR</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const password = 'qr-helper-secret-passphrase';
    const salt = 'qr-helper-salt';
    function utf8ToBytes(str) { return new TextEncoder().encode(str); }
    function bytesToUtf8(bytes) { return new TextDecoder().decode(bytes); }
    function base64UrlEncode(bytes) {
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    function base64UrlDecode(str) {
      const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64 + '==='.slice((b64.length + 3) % 4);
      const binary = atob(padded);
      const out = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
      return out;
    }
    async function getKey() {
      const baseKey = await crypto.subtle.importKey('raw', utf8ToBytes(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: utf8ToBytes(salt), iterations: 100000, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }
    async function encryptPayload(payload) {
      const key = await getKey();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        utf8ToBytes(JSON.stringify(payload))
      );
      const combined = new Uint8Array(iv.length + encrypted.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(encrypted), iv.length);
      return base64UrlEncode(combined);
    }
    async function decryptPayload(token) {
      const raw = base64UrlDecode(token);
      const iv = raw.slice(0, 12);
      const data = raw.slice(12);
      const key = await getKey();
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
      return JSON.parse(bytesToUtf8(new Uint8Array(decrypted)));
    }
    function getQueryParams() { return new URLSearchParams(location.search); }
    const socialServices = [
      { value: 'linkedin', label: 'LinkedIn', icon: '💼', prefix: 'https://www.linkedin.com/in/', placeholder: 'username' },
      { value: 'youtube', label: 'YouTube', icon: '▶️', prefix: 'https://www.youtube.com/', placeholder: 'channel or username' },
      { value: 'instagram', label: 'Instagram', icon: '📸', prefix: 'https://www.instagram.com/', placeholder: 'username' },
      { value: 'x', label: 'X', icon: '✖️', prefix: 'https://x.com/', placeholder: 'username' },
      { value: 'reddit', label: 'Reddit', icon: '👾', prefix: 'https://www.reddit.com/user/', placeholder: 'username' },
      { value: 'snapchat', label: 'Snapchat', icon: '👻', prefix: 'https://www.snapchat.com/add/', placeholder: 'username' },
      { value: 'tiktok', label: 'TikTok', icon: '🎵', prefix: 'https://www.tiktok.com/@', placeholder: 'username' },
      { value: 'facebook', label: 'Facebook', icon: '📘', prefix: 'https://www.facebook.com/', placeholder: 'username' },
      { value: 'github', label: 'GitHub', icon: '🐙', prefix: 'https://github.com/', placeholder: 'username' }
    ];
    const socials = [{ service: 'linkedin', username: '' }];
    const websites = [{ url: '' }];
    const socialList = document.getElementById('socialList');
    const websiteList = document.getElementById('websiteList');
    const errorEl = document.getElementById('error');
    const pageTitle = document.getElementById('pageTitle');
    const submitButton = document.getElementById('submitButton');
    const editLink = document.getElementById('editLink');
    function setError(message) {
      if (!message) { errorEl.style.display = 'none'; return; }
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }
    function buildSocialUrl(item) {
      if (!item.service || !item.username.trim()) return '';
      const service = socialServices.find(service => service.value === item.service);
      if (!service) return '';
      const username = item.username.trim().replace(/^@+/, '');
      return service.prefix + encodeURIComponent(username);
    }
    function deriveUsernameFromUrl(serviceValue, url) {
      const service = socialServices.find(service => service.value === serviceValue);
      if (!service || !url) return '';
      const prefix = service.prefix;
      if (!url.startsWith(prefix)) return '';
      return decodeURIComponent(url.slice(prefix.length).replace(/^@+/, ''));
    }
    function renderSocials() {
      socialList.innerHTML = '';
      socials.forEach((item, index) => {
        const service = socialServices.find(service => service.value === item.service) || socialServices[0];
        const node = document.createElement('div');
        node.className = 'item';
        node.innerHTML = `
              <label>Social platform
            <select data-list="socials" data-index="${index}" data-field="service">
              ${socialServices.map(service => `
                <option value="${service.value}"${service.value === (item.service || service.value) ? ' selected' : ''}>
                  ${service.icon} ${service.label}
                </option>
              `).join('')}
            </select>
          </label>
          <label>Username
            <input placeholder="${service.placeholder}" data-list="socials" data-index="${index}" data-field="username" value="${item.username || ''}">
          </label>
          <button type="button" data-action="remove" data-list="socials" data-index="${index}" class="secondary">Remove social</button>
        `;
        socialList.appendChild(node);
      });
    }
    function renderWebsites() {
      websiteList.innerHTML = '';
      websites.forEach((item, index) => {
        const node = document.createElement('div');
        node.className = 'item';
        node.innerHTML = `
          <label>Website URL
            <input data-list="websites" data-index="${index}" data-field="url" value="${item.url}">
          </label>
          <button type="button" data-action="remove" data-list="websites" data-index="${index}" class="secondary">Remove website</button>
        `;
        websiteList.appendChild(node);
      });
    }
    function attachListHandlers(container) {
      container.addEventListener('input', event => {
        const target = event.target;
        const listName = target.dataset.list;
        if (!listName) return;
        const index = Number(target.dataset.index);
        const field = target.dataset.field;
        if (listName === 'socials') {
          socials[index][field] = target.value;
          if (field === 'service' || field === 'username') {
            renderSocials();
            return;
          }
        }
        if (listName === 'websites') websites[index][field] = target.value;
      });
      container.addEventListener('click', event => {
        const button = event.target;
        if (button.dataset.action !== 'remove') return;
        const listName = button.dataset.list;
        const index = Number(button.dataset.index);
        if (listName === 'socials') {
          socials.splice(index, 1);
          if (!socials.length) socials.push({ service: 'linkedin', username: '' });
          renderSocials();
        }
        if (listName === 'websites') {
          websites.splice(index, 1);
          if (!websites.length) websites.push({ url: '' });
          renderWebsites();
        }
      });
    }
    function gatherPayload() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      return {
        firstName,
        lastName,
        phone,
        email,
        socials: socials.filter(item => item.service.trim() && item.username.trim()).map(item => ({ name: item.service.trim(), username: item.username.trim() })),
        websites: websites.filter(item => item.url.trim()).map(item => ({ url: item.url.trim() }))
      };
    }
    document.addEventListener('DOMContentLoaded', async () => {
      attachListHandlers(socialList);
      attachListHandlers(websiteList);
      renderSocials();
      renderWebsites();
      const params = getQueryParams();
      const mode = params.get('mode');
      const data = params.get('data');
      if (mode === 'edit' && data) {
        pageTitle.textContent = 'Edit QR Form';
        submitButton.textContent = 'Update QR';
        try {
          const payload = await decryptPayload(data);
          document.getElementById('firstName').value = payload.firstName || '';
          document.getElementById('lastName').value = payload.lastName || '';
          document.getElementById('phone').value = payload.phone || '';
          document.getElementById('email').value = payload.email || '';
          socials.length = 0;
          websites.length = 0;
          (payload.socials || [{ name: '', username: '' }]).forEach(item => {
            const service = socialServices.find(service => service.value === item.name) ? item.name : 'linkedin';
            const username = (item.username || '').trim() || deriveUsernameFromUrl(service, item.url || '');
            socials.push({
              service,
              username
            });
          });
          (payload.websites || [{ url: '' }]).forEach(item => websites.push({ url: item.url || '' }));
          renderSocials();
          renderWebsites();
          editLink.href = `create.html?mode=edit&data=${encodeURIComponent(data)}`;
        } catch {
          setError('Unable to load existing QR data.');
        }
      }
      document.getElementById('addSocial').addEventListener('click', () => { socials.push({ service: 'linkedin', username: '' }); renderSocials(); });
      document.getElementById('addWebsite').addEventListener('click', () => { websites.push({ url: '' }); renderWebsites(); });
      document.getElementById('qrForm').addEventListener('submit', async event => {
        event.preventDefault();
        setError('');
        if (!crypto?.subtle) { setError('Encryption API unavailable on this device.'); return; }
        try {
          const payload = gatherPayload();
          const token = await encryptPayload(payload);
          location.href = `index.html?data=${encodeURIComponent(token)}`;
        } catch {
          setError('Unable to encrypt the form data.');
        }
      });

      const menuToggle = document.getElementById('menuToggle');
      const navMenu = document.getElementById('navMenu');
      menuToggle.addEventListener('click', () => {
        const isOpen = menuToggle.getAttribute('aria-expanded') === 'true';
        menuToggle.setAttribute('aria-expanded', String(!isOpen));
        navMenu.hidden = isOpen;
        document.querySelector('.topbar').classList.toggle('open', !isOpen);
      });
    });
  </script>
</body>
</html>
