<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Helper</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef2f6;
      color: #12263f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    .page { max-width: 760px; margin: 0 auto; padding: 20px 16px 32px; }
    
    /* Navigation */
    .topbar { position: relative; display: flex; align-items: center; justify-content: flex-end; margin-bottom: 22px; }
    .menu-button {
      appearance: none;
      border: 1px solid #d6dce6;
      border-radius: 16px;
      padding: 10px 14px;
      background: #fff;
      color: #1f3a68;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      transition: all .15s ease;
    }
    .menu-button:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(17, 55, 101, .08); border-color: #cbd5e1; }
    .menu-icon { width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; background: #2563eb; color: #fff; font-size: 0.95rem; }

    .nav-menu {
      position: absolute;
      top: calc(100% + 12px); right: 0; left: 0;
      display: none; flex-direction: column; gap: 12px; padding: 18px;
      background: rgba(255,255,255,0.98); border: 1px solid #d6dce6; border-radius: 24px;
      box-shadow: 0 28px 60px rgba(15, 23, 42, .16); backdrop-filter: blur(16px); z-index: 10;
    }
    .topbar.open .nav-menu { display: flex; }
    .nav-menu a { text-decoration: none; color: #1f3a68; background: #f8fbff; padding: 14px 16px; border-radius: 16px; transition: all .15s ease; }

    h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); margin: 0 0 10px; text-align: center; }
    
    .card {
      background: linear-gradient(180deg, #ffffff 0%, #f6f9fc 100%);
      border: 1px solid #dfe7f2; border-radius: 26px;
      box-shadow: 0 18px 45px rgba(26, 61, 117, .08); padding: 22px;
    }
    
    .notice { margin: 0; padding: 16px; border-radius: 18px; background: #fff3e2; color: #8f4b00; border: 1px solid #f2d1a0; }
    
    /* QR Styles */
    .qr-toggle { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 0 auto 18px; }
    .qr-switch { position: relative; display: inline-block; width: 52px; height: 28px; }
    .qr-switch input { opacity: 0; width: 0; height: 0; }
    .qr-slider { position: absolute; inset: 0; background: #d1d5db; border-radius: 999px; transition: .2s; cursor: pointer; }
    .qr-slider::before { content: ''; position: absolute; left: 4px; top: 4px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: .2s; }
    .qr-switch input:checked + .qr-slider { background: #2563eb; }
    .qr-switch input:checked + .qr-slider::before { transform: translateX(24px); }
    .qr-wrapper { display: grid; place-items: center; margin: 0 auto 20px; padding: 18px; background: #fff; border-radius: 26px; border: 1px solid #e5edf7; }
    .qr-wrapper img { width: min(100%, 260px); height: auto; }
    
    /* Profile Details */
    .details { display: grid; gap: 10px; }
    .details p { margin: 0; display: flex; align-items: center; line-height: 1.6; }
    .details strong { min-width: 70px; color: #344767; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .details a { color: #2563eb; text-decoration: none; word-break: break-all; }

    /* SOCIAL GRID STYLING */
    .section-title { margin: 24px 0 12px; font-size: 1rem; color: #1d3557; font-weight: 700; border-bottom: 1px solid #e5edf7; padding-bottom: 8px; }
    
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .social-item {
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      background: #ffffff;
      border: 1px solid #dfe7f2;
      border-radius: 14px;
      color: #495161;
      font-size: 1.3rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .social-item:hover .social-icon {
      background: #8690a5;
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.15);
      border-color: #282a2d;
    }

    @media (max-width: 520px) {
      .card { padding: 18px; }
      .social-grid { grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="topbar">
      <button id="menuToggle" class="menu-button" type="button" aria-expanded="false">
        <span class="menu-icon">☰</span> Menu
      </button>
      <div id="navMenu" class="nav-menu" hidden>
        <a href="index.html">Home</a>
        <a href="create.html">Create QR</a>
        <a id="editLink" href="create.html">Edit QR</a>
      </div>
    </nav>

    <h1>QR Helper</h1>

    <div class="card">
      <p id="message" class="notice">Loading QR payload...</p>
      <div id="result" style="display:none;">
        <div class="qr-toggle">
          <label class="qr-switch">
            <input id="toggleQr" type="checkbox">
            <span class="qr-slider"></span>
          </label>
          <span class="qr-toggle-label">Click to show QR</span>
        </div>

        <div id="qrContainer" class="qr-wrapper" style="display:none;">
          <img id="qrImage" src="" alt="QR code">
        </div>

        <div class="details">
          <p><strong>Name</strong><span id="name"></span></p>
          <p id="phoneRow"><strong>Phone</strong><a id="phoneLink" href=""></a></p>
          <p id="emailRow"><strong>Email</strong><a id="emailLink" href=""></a></p>

          <div id="socialsSection"></div>
          <div id="websitesSection"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const password = 'qr-helper-secret-passphrase';
    const salt = 'qr-helper-salt';
    
    const iconMap = {
      linkedin: 'fa-brands fa-linkedin',
      youtube: 'fa-brands fa-youtube',
      instagram: 'fa-brands fa-instagram',
      x: 'fa-brands fa-x-twitter',
      reddit: 'fa-brands fa-reddit',
      snapchat: 'fa-brands fa-snapchat',
      tiktok: 'fa-brands fa-tiktok',
      facebook: 'fa-brands fa-facebook',
      github: 'fa-brands fa-github'
    };

    const utf8ToBytes = (str) => new TextEncoder().encode(str);
    const bytesToUtf8 = (bytes) => new TextDecoder().decode(bytes);
    const base64UrlDecode = (str) => {
      const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64 + '==='.slice((b64.length + 3) % 4);
      const binary = atob(padded);
      const out = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
      return out;
    };

    async function getKey() {
      const baseKey = await crypto.subtle.importKey('raw', utf8ToBytes(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: utf8ToBytes(salt), iterations: 100000, hash: 'SHA-256' },
        baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
      );
    }

    async function decryptPayload(token) {
      const raw = base64UrlDecode(token);
      const iv = raw.slice(0, 12);
      const data = raw.slice(12);
      const key = await getKey();
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
      return JSON.parse(bytesToUtf8(new Uint8Array(decrypted)));
    }

    const socialServices = [
      { value: 'linkedin', prefix: 'https://www.linkedin.com/in/' },
      { value: 'youtube', prefix: 'https://www.youtube.com/@' },
      { value: 'instagram', prefix: 'https://www.instagram.com/' },
      { value: 'x', prefix: 'https://x.com/' },
      { value: 'reddit', prefix: 'https://www.reddit.com/user/' },
      { value: 'snapchat', prefix: 'https://www.snapchat.com/add/' },
      { value: 'tiktok', prefix: 'https://www.tiktok.com/@' },
      { value: 'facebook', prefix: 'https://www.facebook.com/' },
      { value: 'github', prefix: 'https://github.com/' }
    ];

    function buildSocialUrl(item) {
      if (item.username) {
        const service = socialServices.find(s => s.value === item.name);
        if (service) return service.prefix + encodeURIComponent(item.username.trim().replace(/^@+/, ''));
      }
      return item.url || '';
    }

    function createGrid(title, items, itemHtml) {
      if (!items?.length) return '';
      return `<h3 class="section-title">${title}</h3><div class="social-grid">${items.map(itemHtml).join('')}</div>`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const token = new URLSearchParams(location.search).get('data');
      if (!token) {
        document.getElementById('message').textContent = 'No QR data found.';
        return;
      }

      try {
        const payload = await decryptPayload(token);
        document.getElementById('message').style.display = 'none';
        document.getElementById('result').style.display = 'block';

        // QR Logic
        const qrContainer = document.getElementById('qrContainer');
        const toggleQr = document.getElementById('toggleQr');
        toggleQr.addEventListener('change', () => {
          qrContainer.style.display = toggleQr.checked ? 'grid' : 'none';
          document.querySelector('.qr-toggle-label').textContent = toggleQr.checked ? 'Click to hide QR' : 'Click to show QR';
        });

        // Basic Info
        document.getElementById('name').textContent = `${payload.firstName || ''} ${payload.lastName || ''}`.trim() || '—';
        
        const setupLink = (id, rowId, value, prefix) => {
          const row = document.getElementById(rowId);
          if (value) {
            row.style.display = 'flex';
            const link = document.getElementById(id);
            link.href = prefix + value;
            link.textContent = value;
          } else { row.style.display = 'none'; }
        };
        setupLink('phoneLink', 'phoneRow', payload.phone, 'tel:');
        setupLink('emailLink', 'emailRow', payload.email, 'mailto:');

        // Render Social Grid
        document.getElementById('socialsSection').innerHTML = createGrid('Socials', payload.socials || [], item => {
          const url = buildSocialUrl(item);
          const iconClass = iconMap[item.name.toLowerCase()] || 'fa-solid fa-link';
          return `
            <a href="${url}" target="_blank" rel="noreferrer" class="social-item" title="${item.name}">
              <span class="social-icon"><i class="${iconClass}"></i></span>
            </a>`;
        });

        // Render Websites as a grid too
        document.getElementById('websitesSection').innerHTML = createGrid('Websites', payload.websites || [], item => {
          return `
            <a href="${item.url}" target="_blank" rel="noreferrer" class="social-item" title="Website">
              <span class="social-icon"><i class="fa-solid fa-globe"></i></span>
            </a>`;
        });

        document.getElementById('editLink').href = `create.html?mode=edit&data=${encodeURIComponent(token)}`;
        document.getElementById('qrImage').src = 'https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=' + encodeURIComponent(location.href);

        // Menu Toggle
        const menuToggle = document.getElementById('menuToggle');
        menuToggle.addEventListener('click', () => {
          const open = menuToggle.getAttribute('aria-expanded') === 'true';
          menuToggle.setAttribute('aria-expanded', !open);
          document.getElementById('navMenu').hidden = open;
          document.querySelector('.topbar').classList.toggle('open', !open);
        });

      } catch (e) {
        document.getElementById('message').textContent = 'Unable to decrypt QR data.';
      }
    });
  </script>
</body>
</html>
